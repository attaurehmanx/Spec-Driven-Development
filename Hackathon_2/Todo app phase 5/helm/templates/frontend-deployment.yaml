apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-management-frontend
  namespace: default
  labels:
    app: task-management
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-management
      component: frontend
  template:
    metadata:
      labels:
        app: task-management
        component: frontend
    spec:
      containers:
      - name: frontend
        image: task-management-frontend:latest
        imagePullPolicy: Never  # Use local image in Minikube
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        # Client-side environment variables (baked into Next.js bundle at build time)
        # These are set via Docker build args, but we can override at runtime for SSR
        - name: NEXT_PUBLIC_BACKEND_URL
          value: "http://192.168.49.2:30081"  # Minikube NodePort for backend
        - name: NEXT_PUBLIC_API_BASE_URL
          value: "http://192.168.49.2:30081/api"
        - name: NEXT_PUBLIC_BETTER_AUTH_URL
          value: "http://192.168.49.2:30080"  # Minikube NodePort for frontend

        # Server-side environment variables (for Next.js SSR)
        - name: BACKEND_URL
          value: "http://task-management-backend:8001"  # Internal service name
        - name: API_BASE_URL
          value: "http://task-management-backend:8001/api"
        - name: BETTER_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: auth-secret

        # Next.js configuration
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"

        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: task-management-frontend
  namespace: default
  labels:
    app: task-management
    component: frontend
spec:
  type: NodePort  # Use NodePort for Minikube, LoadBalancer for cloud
  selector:
    app: task-management
    component: frontend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080  # Fixed port for Minikube access
    protocol: TCP
    name: http
