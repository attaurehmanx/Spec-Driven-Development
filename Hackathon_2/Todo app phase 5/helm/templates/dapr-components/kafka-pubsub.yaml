apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    # Kafka broker connection
    - name: brokers
      value: "redpanda-0.redpanda.default.svc.cluster.local:9093"
    - name: consumerGroup
      value: "task-management-group"
    - name: clientId
      value: "task-management-api"
    # Topic configuration
    - name: authRequired
      value: "false"
    - name: maxMessageBytes
      value: "1024000"
    # Consumer configuration
    - name: consumeRetryInterval
      value: "200ms"
    - name: version
      value: "2.0.0"
